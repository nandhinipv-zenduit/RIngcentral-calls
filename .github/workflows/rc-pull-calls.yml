name: RC Pull Calls
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}
jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run main.py
        env:
          RC_CLIENT_ID: ${{ secrets.RC_CLIENT_ID }}
          RC_CLIENT_SECRET: ${{ secrets.RC_CLIENT_SECRET }}
          RC_REFRESH_TOKEN: ${{ secrets.RC_REFRESH_TOKEN }}
          ZOHO_CLIENT_ID_UNI: ${{ secrets.ZOHO_CLIENT_ID_UNI }}
          ZOHO_CLIENT_SECRET_UNI: ${{ secrets.ZOHO_CLIENT_SECRET_UNI }}
          ZOHO_REFRESH_TOKEN_UNI: ${{ secrets.ZOHO_REFRESH_TOKEN_UNI }}
        run: python main.py
      - name: Persist rotated RC refresh token
        if: always()
        run: |
          if [ -f new_rc_refresh_token.txt ]; then
            NEW_TOKEN=$(cat new_rc_refresh_token.txt)
            gh secret set RC_REFRESH_TOKEN --body "$NEW_TOKEN" --repo ${{ github.repository }}
            echo "RC_REFRESH_TOKEN updated."
          else
            echo "No new_rc_refresh_token.txt found — skipping secret update."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
